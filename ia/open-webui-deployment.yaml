apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: ia
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama.ia.svc.cluster.local:11434"
            - name: WEBUI_AUTH
              value: "false"
            - name: RAG_EMBEDDING_ENGINE
              value: "ollama"
            - name: RAG_EMBEDDING_MODEL
              value: "tinyllama"
            - name: ENABLE_RAG_WEB_SEARCH
              value: "false"
          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: ia
spec:
  selector:
    app: open-webui
  ports:
    - port: 80
      targetPort: 8080
  type: NodePort
