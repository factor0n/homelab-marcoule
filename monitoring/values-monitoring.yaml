prometheus:
  prometheusSpec:
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m
    retention: 7d
    scrapeInterval: 30s
    evaluationInterval: 30s

grafana:
  adminUser: admin
  adminPassword: homelab-cea-2026
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 300m
  service:
    type: NodePort
    nodePort: 30300

nodeExporter:
  enabled: true

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 100m

additionalPrometheusRulesMap:
  homelab-hpc-rules:
    groups:
      - name: hpc-cluster-alerts
        rules:
          - alert: HighCpuUsage
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CPU élevé sur {{ $labels.instance }}"
          - alert: HighMemoryUsage
            expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Mémoire élevée sur {{ $labels.instance }}"
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} en crash loop"
